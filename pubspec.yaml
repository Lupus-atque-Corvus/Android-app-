name: traum
description: "TRAUM — Personal Life Dashboard. All data stays on your device."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24

  # Preferences
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Health
  health: ^13.3.1

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2
  timezone: ^0.9.4
  flutter_timezone: ^1.0.4

  # Homescreen widgets
  home_widget: ^0.6.0

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Biometrics
  local_auth: ^2.3.0

  # HTTP
  http: ^1.2.2

  # Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Animation
  lottie: ^3.1.2

  # i18n
  intl: ^0.20.0

  # Permissions
  permission_handler: ^11.3.1

  # Geo / Location
  geolocator: ^12.0.0

  # Sharing / Export / Backup
  share_plus: ^10.0.0
  archive: ^3.6.0

  # Links / Email
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

  # Path
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/exercises/
    - assets/supplements/
    - assets/medications/
    - assets/lottie/
